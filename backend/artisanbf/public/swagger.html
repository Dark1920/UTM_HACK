<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArtisanBF API Documentation - Swagger UI</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui.css" />
  <style>
    body { margin: 0; padding: 0; }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }
    .header h1 { margin: 0; font-size: 2rem; }
    .header p { margin: 10px 0 0 0; opacity: 0.9; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🚀 ArtisanBF API Documentation</h1>
    <p>Documentation interactive - Testez toutes les APIs en temps réel</p>
  </div>
  <div id="swagger-ui"></div>

  <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-bundle.js"></script>
  <script>
    const swaggerSpec = {
      openapi: '3.0.0',
      info: {
        title: 'ArtisanBF API',
        version: '2.0.0',
        description: 'API complète pour la plateforme ArtisanBF - IA, Commerces, Avis, Authentification et Recherche'
      },
      servers: [{ url: 'http://localhost:3000', description: 'Développement' }],
      tags: [
        { name: 'IA', description: 'Intelligence artificielle (Groq/Llama 3.1)' },
        { name: 'Commerces', description: 'Gestion des commerces (CRUD)' },
        { name: 'Avis', description: 'Gestion des avis avec analyse IA' },
        { name: 'Authentification', description: 'Inscription et connexion' },
        { name: 'Recherche', description: 'Recherche avec géolocalisation' }
      ],
      paths: {
        // IA - Analyze
        '/api/ai/analyze': {
          post: {
            tags: ['IA'],
            summary: 'Analyse un commentaire avec l\'IA',
            requestBody: {
              required: true,
              content: {
                'application/json': {
                  schema: {
                    type: 'object',
                    required: ['commentaire'],
                    properties: {
                      commentaire: { type: 'string', example: 'Ce mécanicien est excellent' }
                    }
                  }
                }
              }
            },
            responses: {
              '200': {
                description: 'Analyse réussie',
                content: {
                  'application/json': {
                    example: {
                      pertinent: true,
                      sentiment: 'positif',
                      note: 5,
                      points_forts: ['qualité', 'rapidité'],
                      points_faibles: [],
                      justification: 'Commentaire très positif'
                    }
                  }
                }
              }
            }
          }
        },

        // IA - Summarize
        '/api/ai/summarize': {
          post: {
            tags: ['IA'],
            summary: 'Résume plusieurs commentaires',
            requestBody: {
              required: true,
              content: {
                'application/json': {
                  schema: {
                    type: 'object',
                    required: ['commentaires'],
                    properties: {
                      commentaires: {
                        type: 'array',
                        items: { type: 'string' },
                        example: ['bon travail', 'trop cher', 'je recommande']
                      }
                    }
                  }
                }
              }
            },
            responses: {
              '200': {
                description: 'Résumé généré',
                content: {
                  'application/json': {
                    example: {
                      resume: 'Commerce apprécié pour la qualité mais prix élevé',
                      points_forts: ['Travail de qualité'],
                      points_faibles: ['Prix élevé']
                    }
                  }
                }
              }
            }
          }
        },

        // Commerces - Liste
        '/api/commerces': {
          get: {
            tags: ['Commerces'],
            summary: 'Liste tous les commerces',
            parameters: [
              { in: 'query', name: 'page', schema: { type: 'integer', default: 1 } },
              { in: 'query', name: 'limit', schema: { type: 'integer', default: 20 } },
              { in: 'query', name: 'categorie', schema: { type: 'string' } }
            ],
            responses: { '200': { description: 'Liste des commerces' } }
          },
          post: {
            tags: ['Commerces'],
            summary: 'Créer un commerce',
            requestBody: {
              required: true,
              content: {
                'application/json': {
                  schema: {
                    type: 'object',
                    required: ['nom', 'categorie', 'adresse'],
                    properties: {
                      nom: { type: 'string', example: 'Garage du Faso' },
                      categorie: { type: 'string', example: 'Mécanicien' },
                      adresse: { type: 'string', example: 'Ouaga 2000' },
                      telephone: { type: 'string', example: '+226 70 12 34 56' },
                      description: { type: 'string', example: 'Réparation motos et voitures' },
                      latitude: { type: 'number', example: 12.3714 },
                      longitude: { type: 'number', example: -1.5197 }
                    }
                  }
                }
              }
            },
            responses: { '201': { description: 'Commerce créé' } }
          }
        },

        // Avis - Liste et Création
        '/api/avis': {
          get: {
            tags: ['Avis'],
            summary: 'Liste les avis d\'un commerce',
            parameters: [
              { in: 'query', name: 'commerce_id', required: true, schema: { type: 'string' } },
              { in: 'query', name: 'page', schema: { type: 'integer', default: 1 } },
              { in: 'query', name: 'limit', schema: { type: 'integer', default: 10 } }
            ],
            responses: { '200': { description: 'Liste des avis' } }
          },
          post: {
            tags: ['Avis'],
            summary: 'Créer un avis avec analyse IA',
            requestBody: {
              required: true,
              content: {
                'application/json': {
                  schema: {
                    type: 'object',
                    required: ['commerce_id', 'note', 'commentaire'],
                    properties: {
                      commerce_id: { type: 'string', example: 'uuid-du-commerce' },
                      note: { type: 'integer', minimum: 1, maximum: 5, example: 4 },
                      commentaire: { type: 'string', example: 'Très bon service' }
                    }
                  }
                }
              }
            },
            responses: {
              '201': {
                description: 'Avis créé avec analyse IA',
                content: {
                  'application/json': {
                    example: {
                      avis: { id: '...', note: 4, commentaire: 'Très bon service' },
                      analyse_ia: { sentiment: 'positif', note: 5 }
                    }
                  }
                }
              }
            }
          }
        },

        // Auth - Inscription
        '/api/auth/inscription': {
          post: {
            tags: ['Authentification'],
            summary: 'Créer un compte',
            requestBody: {
              required: true,
              content: {
                'application/json': {
                  schema: {
                    type: 'object',
                    required: ['email', 'password', 'nom'],
                    properties: {
                      email: { type: 'string', format: 'email', example: 'user@example.com' },
                      password: { type: 'string', format: 'password', minLength: 6, example: 'password123' },
                      nom: { type: 'string', example: 'Sawadogo' },
                      prenom: { type: 'string', example: 'Ibrahim' },
                      role: { type: 'string', enum: ['citoyen', 'artisan', 'admin'], default: 'citoyen' }
                    }
                  }
                }
              }
            },
            responses: { '201': { description: 'Inscription réussie' } }
          }
        },

        // Auth - Connexion
        '/api/auth/connexion': {
          post: {
            tags: ['Authentification'],
            summary: 'Se connecter',
            requestBody: {
              required: true,
              content: {
                'application/json': {
                  schema: {
                    type: 'object',
                    required: ['email', 'password'],
                    properties: {
                      email: { type: 'string', format: 'email', example: 'user@example.com' },
                      password: { type: 'string', format: 'password', example: 'password123' }
                    }
                  }
                }
              }
            },
            responses: {
              '200': {
                description: 'Connexion réussie',
                content: {
                  'application/json': {
                    example: {
                      message: 'Connexion réussie',
                      user: { id: '...', email: 'user@example.com' },
                      session: { access_token: '...' }
                    }
                  }
                }
              }
            }
          }
        },

        // Recherche
        '/api/recherche': {
          get: {
            tags: ['Recherche'],
            summary: 'Rechercher des commerces',
            parameters: [
              { in: 'query', name: 'q', schema: { type: 'string' }, description: 'Terme de recherche' },
              { in: 'query', name: 'categorie', schema: { type: 'string' }, description: 'Catégorie' },
              { in: 'query', name: 'latitude', schema: { type: 'number' }, description: 'Latitude' },
              { in: 'query', name: 'longitude', schema: { type: 'number' }, description: 'Longitude' },
              { in: 'query', name: 'rayon', schema: { type: 'integer', default: 5000 }, description: 'Rayon en mètres' }
            ],
            responses: {
              '200': {
                description: 'Résultats de recherche',
                content: {
                  'application/json': {
                    example: {
                      commerces: [{ id: '...', nom: 'Garage du Faso', distance: 1200 }],
                      total: 1,
                      position: { latitude: 12.3714, longitude: -1.5197 }
                    }
                  }
                }
              }
            }
          }
        }
      }
    }

    window.onload = function() {
      window.ui = SwaggerUIBundle({
        spec: swaggerSpec,
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIBundle.SwaggerUIStandalonePreset
        ],
        layout: "BaseLayout",
        docExpansion: "list",
        filter: true,
        tryItOutEnabled: true
      })
    }
  </script>
</body>
</html>
